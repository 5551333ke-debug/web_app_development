<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="專業的活動報名與管理系統，讓主辦活動變得簡單高效。">
    <title>{% block title %}活動報名系統{% endblock %}</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="{{ url_for('main.index') }}" class="brand" id="brand-logo">EventMaster</a>
            <nav class="nav-links">
                <a href="{{ url_for('main.index') }}" id="nav-home">探索活動</a>
                <a href="{{ url_for('admin.login') }}" id="nav-login" class="btn-primary">主辦方登入</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 EventMaster. 版權所有。由 Antigravity 團隊提供技術支援。</p>
        </div>
    </footer>

    <!-- Main JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
